        function revealPage() {
            window.isNavigating = false;
            const transitionEl = document.querySelector('.page-transition');
            if (transitionEl) {
                transitionEl.classList.remove('leaving');
                setTimeout(() => { transitionEl.classList.add('loaded'); }, 100);
            }
        }
        revealPage(); 
        window.addEventListener('pageshow', revealPage);

        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smooth: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        window.onbeforeunload = function () { window.scrollTo(0, 0); };

        const heroElement = document.getElementById("scramble-text");
        const expElement = document.getElementById("scramble-exp");
        if (heroElement && expElement) {
            const heroWords = ["Game", "Economy", "System", "Character", "Technical"];
            const expWords = ["Experience", "Work"]; 
            let currentIndex = 0;
            const chars = "ABCDEFGHJKLNPQRSTUVXYZ0123456789#&*"; 
            function scrambleWord(element, target) {
                let iteration = 0;
                const currentText = element.innerText;
                const maxLength = Math.min(10, Math.max(currentText.length, target.length));
                let interval = setInterval(() => {
                    let scrambled = "";
                    for (let i = 0; i < maxLength; i++) {
                        if (i < iteration) { scrambled += target[i] || ""; } 
                        else { scrambled += chars[Math.floor(Math.random() * chars.length)]; }
                    }
                    element.innerText = scrambled;
                    if (iteration >= maxLength) { clearInterval(interval); element.innerText = target; }
                    iteration += 0.6; 
                }, 60); 
            }
            setTimeout(() => { setInterval(() => { currentIndex++; scrambleWord(heroElement, heroWords[currentIndex % heroWords.length]); scrambleWord(expElement, expWords[currentIndex % expWords.length]); }, 2500); }, 3500);
        }

                if (heroScreen) {
                    let startFade = window.innerHeight * 0.4; let endFade = window.innerHeight * 0.8; let opacity = 1; 
                    if (scrollY > startFade) opacity = 1 - ((scrollY - startFade) / (endFade - startFade));
                    if (opacity <= 0) { heroScreen.style.opacity = "0"; heroScreen.style.visibility = "hidden"; } 
                    else { heroScreen.style.opacity = opacity.toString(); heroScreen.style.visibility = "visible"; }
                }
            });

                const revealOptions = { threshold: 0.15 };

                    });
                }, revealOptions);
                revealElements.forEach(el => revealOnScroll.observe(el));
            }
        });
